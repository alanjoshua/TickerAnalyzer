{{range $index, $row := .Rows}}
    <tr class="border-b border-gray-700/50 hover:bg-gray-700/20 transition-colors duration-200 text-center" id="row-{{$index}}">
        <td class="px-2 py-2 font-mono text-xs row-label text-gray-300 transition-colors duration-200">{{$row.YearLabel}}</td>

        <td class="px-1"><input type="number" step="any" name="revGrowth" value="{{printf "%.4f" $row.RevGrowth}}" class="w-16 bg-gray-900 border border-gray-600 rounded px-1 py-1 text-center text-white focus:border-blue-500 outline-none"></td>
        <td class="px-1"><input type="number" step="any" name="opMargin" value="{{printf "%.4f" $row.OpMargin}}" class="w-16 bg-gray-900 border border-gray-600 rounded px-1 py-1 text-center text-white focus:border-blue-500 outline-none"></td>
        <td class="px-1"><input type="number" step="any" name="taxRate" value="{{printf "%.4f" $row.TaxRate}}" class="w-16 bg-gray-900 border border-gray-600 rounded px-1 py-1 text-center text-white focus:border-blue-500 outline-none"></td>
        <td class="px-1"><input type="number" step="any" name="salesToCapRatio" value="{{printf "%.4f" $row.SalesToCapRatio}}" class="w-16 bg-gray-900 border border-gray-600 rounded px-1 py-1 text-center text-white focus:border-blue-500 outline-none"></td>
        <td class="px-1"><input type="number" step="any" name="wacc" value="{{printf "%.4f" $row.Wacc}}" class="w-16 bg-gray-900 border border-gray-600 rounded px-1 py-1 text-center text-white focus:border-blue-500 outline-none"></td>
        
        <td class="px-1"><input type="text" readonly name="revenue" value="" class="w-28 bg-gray-900 border border-gray-600 rounded px-1 py-1 text-left text-white outline-none cursor-default opacity-80"></td>
        <td class="px-1"><input type="text" readonly name="ebit" value="" class="w-28 bg-gray-900 border border-gray-600 rounded px-1 py-1 text-left text-white outline-none cursor-default opacity-80"></td>
        <td class="px-1"><input type="text" readonly name="reinvest" value="" class="w-28 bg-gray-900 border border-gray-600 rounded px-1 py-1 text-left text-white outline-none cursor-default opacity-80"></td>
        <td class="px-1"><input type="text" readonly name="fcff" value="" class="w-28 bg-gray-900 border border-gray-600 rounded px-1 py-1 text-left text-white outline-none cursor-default opacity-80"></td>
    </tr>
{{end}}

<script>
    document.getElementById('input-baseRevenue').value = "{{printf "%.2f" .BaseRevenue}}";
    document.getElementById('input-totalCash').value = "{{printf "%.2f" .TotalCash}}";
    document.getElementById('input-totalDebt').value = "{{printf "%.2f" .TotalDebt}}";
    document.getElementById('input-sharesOutstanding').value = "{{printf "%.2f" .SharesOutstanding}}";
    document.getElementById('DCFDataSource').innerText = "{{printf "Data Source: %s" .DataSource}}";
    
    document.querySelectorAll('.formatted-input').forEach(input => {
        formatInputWithCommas(input);
    });
    
    if(validateDCFTableData()) {
        populateDCFTable();
    }
</script>
